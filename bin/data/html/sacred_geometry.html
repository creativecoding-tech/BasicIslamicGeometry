<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Sacred Geometry</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: transparent;
            color: #ffffff;
            padding: 20px;
        }

        .container {
            max-width: 400px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #00ff88;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
        }

        .subtitle {
            font-size: 14px;
            color: #aaaaaa;
            margin-bottom: 20px;
        }

        .section {
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #00d4ff;
        }

        .control-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
            padding: 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 6px;
        }

        .control-label {
            font-size: 14px;
        }

        button {
            background: linear-gradient(135deg, #00ff88 0%, #00d4ff 100%);
            color: #000000;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 255, 136, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 255, 136, 0.5);
        }

        button:active {
            transform: translateY(0);
        }

        button.secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        button.secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        input[type="range"] {
            width: 150px;
            accent-color: #00ff88;
        }

        .status {
            font-size: 12px;
            color: #00ff88;
            margin-top: 15px;
            padding: 10px;
            background: rgba(0, 255, 136, 0.1);
            border-radius: 6px;
            border-left: 3px solid #00ff88;
        }

        /* Toggle Switch Styles */
        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 26px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: relative;
            cursor: pointer;
            display: flex;
            align-items: center;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 255, 255, 0.2);
            border-radius: 26px;
            transition: background-color .4s;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .slider-handle {
            position: absolute;
            height: 18px;
            width: 18px;
            left: 4px;
            background-color: #00ff88;
            border-radius: 50%;
            transition: left .4s;
        }

        /* ON state: slider ke kanan - tetap pakai class untuk background */
        .slider.on {
            background-color: rgba(0, 255, 136, 0.4);
        }

        /* ON/OFF label */
        .on-off-label {
            font-size: 12px;
            font-weight: bold;
            color: #00ff88;
            margin-left: 8px;
        }

        .info {
            font-size: 12px;
            color: #888888;
            margin-top: 15px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⬡ Sacred Geometry</h1>

        <div class="section">
            <div class="section-title">Shape Controls</div>
            <div class="control-group">
                <span class="control-label">Show All Shapes</span>
                <button onclick="app.showAllShapes()">Show</button>
            </div>
            <div class="control-group">
                <span class="control-label">Hide All Shapes</span>
                <button class="secondary" onclick="app.hideAllShapes()">Hide</button>
            </div>
        </div>

        <div class="section">
            <div class="section-title">Display Options</div>
            <div class="control-group">
                <span class="control-label">Labels</span>
                <label class="switch" onclick="onLabelsClick(); return false;">
                    <input type="checkbox" id="labelsToggle" checked>
                    <span class="slider on" id="labelsSlider"><span class="slider-handle"></span></span>
                </label>
                <span class="on-off-label" id="labelsOnOff">ON</span>
            </div>
            <div class="control-group">
                <span class="control-label">Dots</span>
                <label class="switch" onclick="onDotsClick(); return false;">
                    <input type="checkbox" id="dotsToggle" checked>
                    <span class="slider on" id="dotsSlider"><span class="slider-handle"></span></span>
                </label>
                <span class="on-off-label" id="dotsOnOff">ON</span>
            </div>
        </div>

        <div class="section">
            <div class="section-title">Line Width</div>
            <div class="control-group">
                <span class="control-label">Width: <span id="lineWidthValue">4.0</span>px</span>
                <input type="range" id="lineWidthSlider" min="0.5" max="4.0" step="0.5" value="4.0"
                       oninput="updateLineWidth(this.value)">
            </div>
        </div>

        <div class="section">
            <div class="section-title">Animation</div>
            <div class="control-group">
                <span class="control-label">Sequential Draw</span>
                <button onclick="app.startSequential()">Play</button>
            </div>
            <div class="control-group">
                <span class="control-label">Parallel Draw</span>
                <button onclick="app.startParallel()">Play</button>
            </div>
        </div>
    </div>

    <script>
        function updateLineWidth(value) {
            document.getElementById('lineWidthValue').textContent = parseFloat(value).toFixed(1);
        }

        // Prevent double-fire dari checkbox click
        let isTogglingLabels = false;
        let isTogglingDots = false;

        function onLabelsClick() {
            if (isTogglingLabels) return;
            isTogglingLabels = true;
            app.toggleLabels();
            setTimeout(() => { isTogglingLabels = false; }, 100);
        }

        function onDotsClick() {
            if (isTogglingDots) return;
            isTogglingDots = true;
            app.toggleDots();
            setTimeout(() => { isTogglingDots = false; }, 100);
        }

        // Update toggle switch state saat dipanggil dari C++
        function setLabelsState(isVisible) {
            var slider = document.getElementById('labelsSlider');
            var handle = slider.querySelector('.slider-handle');
            // Set class untuk background color
            slider.className = isVisible ? 'slider on' : 'slider';
            // Set inline style langsung untuk handle position
            handle.style.left = isVisible ? '28px' : '4px';
            // Update label
            document.getElementById('labelsOnOff').textContent = isVisible ? 'ON' : 'OFF';
        }

        function setDotsState(isVisible) {
            var slider = document.getElementById('dotsSlider');
            var handle = slider.querySelector('.slider-handle');
            // Set class untuk background color
            slider.className = isVisible ? 'slider on' : 'slider';
            // Set inline style langsung untuk handle position
            handle.style.left = isVisible ? '28px' : '4px';
            // Update label
            document.getElementById('dotsOnOff').textContent = isVisible ? 'ON' : 'OFF';
        }

        // Force initial state setelah delay (untuk tunggu Ultralight render complete)
        setTimeout(function() {
            setLabelsState(true);
            setDotsState(true);
        }, 100);
    </script>
</body>
</html>
