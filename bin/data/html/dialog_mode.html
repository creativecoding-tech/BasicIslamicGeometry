<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Select Mode</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .dialog-container {
            width: 100%;
            height: 100%;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        h1 {
            font-size: 32px;
            color: #ffffff;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .subtitle {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 40px;
        }

        .mode-selection {
            display: flex;
            gap: 30px;
            margin-bottom: 40px;
        }

        .mode-card {
            width: 200px;
            height: 180px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .mode-card:hover {
            transform: translateY(-12px) scale(1.05);
            background: rgba(255, 255, 255, 0.25);
            border-color: rgba(255, 255, 255, 0.6);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4),
                        0 0 40px rgba(255, 255, 255, 0.2);
        }

        .mode-card.selected {
            background: rgba(255, 255, 255, 0.3);
            border-color: #00ff88;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4),
                        0 0 40px rgba(0, 255, 136, 0.6),
                        inset 0 0 20px rgba(0, 255, 136, 0.2);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4),
                            0 0 40px rgba(0, 255, 136, 0.6),
                            inset 0 0 20px rgba(0, 255, 136, 0.2);
            }
            50% {
                box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4),
                            0 0 60px rgba(0, 255, 136, 0.9),
                            inset 0 0 30px rgba(0, 255, 136, 0.4);
            }
        }

        .mode-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .mode-name {
            font-size: 24px;
            font-weight: bold;
            color: #ffffff;
        }

        .button-group {
            display: flex;
            gap: 20px;
        }

        button {
            padding: 12px 40px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        button.close-btn {
            background: rgba(255, 255, 255, 0.2);
            color: #ffffff;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        button.close-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }

        button.next-btn {
            background: linear-gradient(135deg, #00ff88 0%, #00d4ff 100%);
            color: #000000;
        }

        button.next-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 255, 136, 0.4);
        }

        button.next-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
    </style>
</head>
<body>
    <div class="dialog-container">
        <h1>⬡ Islamic Geometry Studio</h1>
        <p class="subtitle">Select Rendering Mode</p>

        <div class="mode-selection">
            <div class="mode-card" onclick="selectMode('2d')" id="mode-2d">
                <div class="mode-icon">□</div>
                <div class="mode-name">2D Mode</div>
            </div>
            <div class="mode-card" onclick="selectMode('3d')" id="mode-3d">
                <div class="mode-icon">◇</div>
                <div class="mode-name">3D Mode</div>
            </div>
        </div>

        <div class="button-group">
            <button class="close-btn" onclick="app.onDialogClose()">Close</button>
        </div>
    </div>

    <script>
        let selectedMode = null;

        function selectMode(mode) {
            selectedMode = mode;

            // Update visual selection
            document.querySelectorAll('.mode-card').forEach(card => {
                card.classList.remove('selected');
            });
            document.getElementById('mode-' + mode).classList.add('selected');

            // Enable next button
            document.getElementById('next-btn').disabled = false;
        }
    </script>
</body>
</html>
