<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Select Template</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .dialog-container {
            width: 100%;
            height: 100%;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        h1 {
            font-size: 32px;
            color: #ffffff;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .subtitle {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 40px;
        }

        .template-list {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 40px;
        }

        .template-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .template-card:hover {
            transform: translateX(5px);
            background: rgba(255, 255, 255, 0.25);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .template-card.selected {
            background: rgba(255, 255, 255, 0.3);
            border-color: #00ff88;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.4);
        }

        .template-icon {
            font-size: 40px;
            width: 60px;
            height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }

        .template-info {
            flex: 1;
        }

        .template-name {
            font-size: 20px;
            font-weight: bold;
            color: #ffffff;
            margin-bottom: 5px;
        }

        .template-desc {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.8);
        }

        .button-group {
            display: flex;
            gap: 20px;
        }

        button {
            padding: 12px 40px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button.back-btn {
            background: rgba(255, 255, 255, 0.2);
            color: #ffffff;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        button.back-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        button.create-btn {
            background: linear-gradient(135deg, #00ff88 0%, #00d4ff 100%);
            color: #000000;
        }

        button.create-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 255, 136, 0.4);
        }
    </style>
</head>
<body>
    <div class="dialog-container">
        <h1>⬡ Islamic Geometry Studio</h1>
        <p class="subtitle">Select Template</p>

        <div class="template-list">
            <div class="template-card selected" onclick="selectTemplate('basic-zellige')" id="template-basic-zellige">
                <div class="template-icon">⬡</div>
                <div class="template-info">
                    <div class="template-name">Basic Zellige</div>
                    <div class="template-desc">5-Circle pattern with crosslines and octagram</div>
                </div>
            </div>
        </div>

        <div class="button-group">
            <button class="back-btn" onclick="app.onBack()">← Back</button>
            <button class="create-btn" onclick="app.onCreate()">Create</button>
        </div>
    </div>

    <script>
        let selectedTemplate = 'basic-zellige';

        function selectTemplate(templateId) {
            selectedTemplate = templateId;

            // Update visual selection
            document.querySelectorAll('.template-card').forEach(card => {
                card.classList.remove('selected');
            });
            document.getElementById('template-' + templateId).classList.add('selected');
        }
    </script>
</body>
</html>
